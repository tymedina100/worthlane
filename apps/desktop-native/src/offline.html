<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; frame-src 'none'" />
    <title>Worthlane connection unavailable</title>
    <style>
      :root { color-scheme: light; font-family: Inter, "Segoe UI", system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px; background: #f4f6f1; color: #102c34; }
      main { width: min(560px, 100%); border: 1px solid #d8e0da; border-radius: 20px; padding: 40px; background: #fff; box-shadow: 0 24px 70px rgba(11, 32, 39, .12); }
      .mark { display: grid; width: 48px; height: 48px; place-items: center; border-radius: 14px; background: #b9ead5; color: #0b2027; font-size: 22px; font-weight: 900; }
      .eyebrow { margin: 28px 0 8px; color: #256f56; font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(30px, 5vw, 42px); line-height: 1.08; letter-spacing: -.04em; }
      p { margin: 16px 0 0; color: #4f625c; font-size: 15px; line-height: 1.6; }
      .target { margin-top: 20px; border-radius: 10px; padding: 12px 14px; background: #eef7f1; color: #215d49; font-size: 13px; }
      button { width: 100%; min-height: 46px; margin-top: 26px; border: 0; border-radius: 11px; background: #0b2027; color: white; font-size: 14px; font-weight: 800; cursor: pointer; }
      button:hover { background: #153842; }
      button:focus-visible { outline: 3px solid #4fc69a; outline-offset: 3px; }
      small { display: block; margin-top: 16px; color: #65766f; font-size: 12px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main aria-labelledby="title">
      <div class="mark" aria-hidden="true">W</div>
      <p class="eyebrow">Connection paused</p>
      <h1 id="title">Worthlane cannot reach your planning workspace.</h1>
      <p id="reason">Check your internet connection, then try again. No financial data was changed.</p>
      <div class="target">Trying to reach <strong id="connection-target">Worthlane</strong></div>
      <button id="retry" type="button">Try again</button>
      <small>If this continues, open Help → Worthlane support from the application menu.</small>
    </main>
    <script src="offline.js"></script>
  </body>
</html>

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Prisma validation and Next builds need a valid URL shape, but CI does
      # not connect to a database in this job.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters!!
      JWT_REFRESH_SECRET: ci-only-refresh-secret-at-least-32-chars!!
      WORTHLANE_API_URL: http://localhost:3001/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Generate Prisma client
        run: pnpm --filter @worthlane/db db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test shared financial rules
        run: pnpm --filter @worthlane/core test

      - name: Test shared API contracts
        run: pnpm --filter @worthlane/contracts test

      - name: Test API
        run: pnpm --filter @worthlane/api test

      - name: Test native desktop security and packaging manifest
        run: pnpm --filter @worthlane/desktop-native test

      - name: Bundle mobile client
        run: pnpm --filter @worthlane/mobile exec expo export --platform ios --output-dir "$RUNNER_TEMP/worthlane-mobile-export"

      - name: Build API
        run: pnpm --filter @worthlane/api build

      - name: Build desktop client
        run: pnpm --filter @worthlane/desktop build

      - name: Build public web client
        run: pnpm --filter @worthlane/web build

  native-windows:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies with the Windows Electron runtime
        run: pnpm install --frozen-lockfile

      - name: Check native desktop source
        run: pnpm --filter @worthlane/desktop-native typecheck

      - name: Test native desktop security and recovery
        run: pnpm --filter @worthlane/desktop-native test

      - name: Package and verify the local Windows application
        run: pnpm desktop:native:pack:local
